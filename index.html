<style>

    --traf:#58D08B; --tend:#E8B84B; --pudlo:rgba(234,243,236,.28);

  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto} *{animation:none!important;transition:none!important} }
  body{background:var(--noc);color:var(--kreda);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:15px;line-height:1.5;min-height:100vh}

  /* ---------- NAGĹĂ“WEK ---------- */
  header{position:relative;overflow:hidden;border-bottom:1px solid var(--linia);padding:42px 20px 30px;text-align:center;
    background:radial-gradient(ellipse 90% 130% at 50% -40%, rgba(88,208,139,.10), transparent 60%),var(--noc)}
  header::before{content:"";position:absolute;left:50%;top:100%;width:560px;height:560px;transform:translate(-50%,-50%);

  h1{font-family:"Saira Condensed",sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(40px,8vw,68px);line-height:.95;letter-spacing:.02em}

  /* ---------- LOGOWANIE ---------- */

  /* ---------- KOMUNIKATY ---------- */

  /* ---------- TABLICA ---------- */
  .scoreboard{background:var(--panel);border:1px solid var(--linia);border-radius:var(--promien);overflow:hidden;margin-bottom:34px}
  .pasek-lidera{height:4px;background:var(--linia)}
  .sb-naglowek{display:flex;justify-content:space-between;align-items:baseline;padding:14px 18px 0}
  .sb-naglowek h2{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:16px;color:var(--kreda-dim)}

    color:var(--kreda-faint);text-align:right;padding:14px 18px 8px;border-bottom:1px solid var(--linia)}
  .scoreboard th:first-child{text-align:left}
  .scoreboard td{padding:12px 18px;border-bottom:1px solid var(--linia);text-align:right;vertical-align:middle}
  .scoreboard tr:last-child td{border-bottom:none}
  .scoreboard td:first-child{text-align:left}
  .gracz-cell{display:flex;align-items:center;gap:10px}
  .gracz-kolor{width:10px;height:10px;border-radius:50%;flex:none}

  .pozycja{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:14px;color:var(--kreda-faint);width:18px;display:inline-block}

  td.kol-pkt{width:90px}

  @media(max-width:560px){
    .scoreboard th:nth-child(4),.scoreboard td:nth-child(4){display:none}
    .pkt{font-size:28px}
  }

  /* ---------- SEKCJA TYPOWANIA ---------- */
  .sekcja-naglowek{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
    font-size:16px;color:var(--kreda-dim);margin:0 0 12px;display:flex;justify-content:space-between;align-items:baseline}
  .sekcja-naglowek .dopisek{font-family:"IBM Plex Sans",sans-serif;text-transform:none;letter-spacing:0;font-weight:400;font-size:12px;color:var(--kreda-faint)}
  .typuj-box{margin-bottom:34px}
  .typuj-mecz{background:var(--panel);border:1px solid rgba(88,208,139,.35);border-radius:var(--promien);padding:14px 16px;margin-bottom:10px}
  .typuj-glowny{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}

  .typuj-wynik .kreska{font-family:"Saira Condensed",sans-serif;font-weight:700;color:var(--kreda-faint)}
  .typuj-akcje{margin-top:10px;display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}

  /* ---------- FILTRY I LISTA ---------- */

  .filtr{background:transparent;border:1px solid var(--linia-mocna);color:var(--kreda-dim);
    font-family:"Saira Condensed",sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:13px;font-weight:600;
    padding:7px 16px;border-radius:999px;cursor:pointer;transition:border-color .15s,color .15s}
  .filtr:hover{color:var(--kreda)}
  .filtr.aktywny{background:var(--kreda);color:var(--noc);border-color:var(--kreda)}

  .dzien-header{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.14em;
    font-size:14px;color:var(--kreda-dim);margin:30px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--linia)}
  .mecz{background:var(--panel-2);border:1px solid var(--linia);border-radius:var(--promien);padding:14px 16px 12px;margin-bottom:10px}
  .mecz.nastepny{border-color:rgba(88,208,139,.45)}
  .mecz-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--kreda-faint);margin-bottom:8px}
  .badge-nastepny{font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:var(--traf)}
  .mecz-glowny{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
  .druzyna{display:flex;align-items:center;gap:8px;min-width:0}
  .druzyna.dom{justify-content:flex-end;text-align:right}
  .druzyna .nazwa{font-weight:600;font-size:15px;overflow-wrap:anywhere}
  .flaga{font-size:20px;flex:none;line-height:1}
  .wynik{font-family:"Saira Condensed",sans-serif;font-weight:800;font-size:28px;line-height:1;font-variant-numeric:tabular-nums;
    min-width:74px;text-align:center;padding:4px 10px;border-radius:6px;background:var(--panel);border:1px solid var(--linia)}
  .wynik.pusty{color:var(--kreda-faint);font-weight:600}
  @media(max-width:560px){
    .druzyna .nazwa{font-size:13px}
    .wynik{font-size:22px;min-width:62px}

  }

  .typy-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px dashed var(--linia)}
  .typ-chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--linia);border-radius:999px;
    padding:3px 12px 3px 9px;font-size:13px;background:var(--panel)}
  .typ-chip .kropka{width:7px;height:7px;border-radius:50%;flex:none}
  .typ-chip .kto{color:var(--kreda-dim);font-size:12px}
  .typ-chip .ile{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:15px;font-variant-numeric:tabular-nums}
  .typ-chip .zysk{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:13px}
  .typ-chip.traf{border-color:rgba(88,208,139,.5)}
  .typ-chip.traf .zysk{color:var(--traf)}
  .typ-chip.tend .zysk{color:var(--tend)}
  .typ-chip.pudlo .ile{color:var(--pudlo)}
  .typ-chip.pudlo .zysk{color:var(--pudlo)}
  .typ-chip.brak{opacity:.45}
  .typ-chip.ukryty{opacity:.7}
  .typ-chip.ukryty .ile{font-size:13px}

  footer{text-align:center;font-size:12px;color:var(--kreda-faint);padding:30px 16px 40px;border-top:1px solid var(--linia)}
</style>
</head>
<body>

<header>
  <p class="eyebrow">Tomek Â· Magda Â· Kuba</p>
  <h1>Typer Mundial <span class="rok">2026</span></h1>
  <p class="zasady">dokĹ‚adny wynik <b>3 pkt</b> Â· trafiona tendencja <b>1 pkt</b> Â· faza pucharowa: wynik po 90 min Â· typy do pierwszego gwizdka, bez poprawek</p>
</header>

<main>
  <section class="login" id="loginBox" aria-label="Logowanie"></section>
  <div id="zawartosc"><p class="info-pasek">Ĺadowanie danychâ€¦</p></div>

<footer>
  Wyniki pobierajÄ… siÄ™ automatycznie Â· cudze typy zobaczysz, gdy sam obstawisz dany mecz
</footer>

<script>
(function(){
  "use strict";

  // ============================================================
  //  TU WKLEJ ADRES SWOJEJ APLIKACJI APPS SCRIPT (koĹ„czy siÄ™ na /exec)
  // ============================================================
  var API_URL = "https://script.google.com/macros/s/AKfycbxFrFw83cf9XmfYIoOj-hxALzVWuWIofPWpQ0o4c07h5zivuWyGG9UjZKhvo9aep_vF/exec";

  var FLAGI = {
    "Meksyk":"đź‡˛đź‡˝","RPA":"đź‡żđź‡¦","Korea PĹ‚d.":"đź‡°đź‡·","Czechy":"đź‡¨đź‡ż",
    "Kanada":"đź‡¨đź‡¦","BoĹ›nia i Hercegowina":"đź‡§đź‡¦","Katar":"đź‡¶đź‡¦","Szwajcaria":"đź‡¨đź‡­",
    "Brazylia":"đź‡§đź‡·","Maroko":"đź‡˛đź‡¦","Haiti":"đź‡­đź‡ą","Szkocja":"đźŹ´ó §ó ˘ó łó Łó ´ó ż",
    "USA":"đź‡şđź‡¸","Paragwaj":"đź‡µđź‡ľ","Australia":"đź‡¦đź‡ş","Turcja":"đź‡ąđź‡·",
    "Niemcy":"đź‡©đź‡Ş","Curacao":"đź‡¨đź‡Ľ","WybrzeĹĽe KoĹ›ci SĹ‚oniowej":"đź‡¨đź‡®","Ekwador":"đź‡Şđź‡¨",
    "Holandia":"đź‡łđź‡±","Japonia":"đź‡Żđź‡µ","Szwecja":"đź‡¸đź‡Ş","Tunezja":"đź‡ąđź‡ł",
    "Belgia":"đź‡§đź‡Ş","Egipt":"đź‡Şđź‡¬","Iran":"đź‡®đź‡·","Nowa Zelandia":"đź‡łđź‡ż",
    "Hiszpania":"đź‡Şđź‡¸","Rep. Zielonego PrzylÄ…dka":"đź‡¨đź‡»","Arabia Saudyjska":"đź‡¸đź‡¦","Urugwaj":"đź‡şđź‡ľ",
    "Francja":"đź‡«đź‡·","Senegal":"đź‡¸đź‡ł","Irak":"đź‡®đź‡¶","Norwegia":"đź‡łđź‡´",
    "Argentyna":"đź‡¦đź‡·","Algieria":"đź‡©đź‡ż","Austria":"đź‡¦đź‡ą","Jordania":"đź‡Żđź‡´",
    "Portugalia":"đź‡µđź‡ą","DR Konga":"đź‡¨đź‡©","Uzbekistan":"đź‡şđź‡ż","Kolumbia":"đź‡¨đź‡´",
    "Anglia":"đźŹ´ó §ó ˘ó Ąó ®ó §ó ż","Ghana":"đź‡¬đź‡­","Panama":"đź‡µđź‡¦","Chorwacja":"đź‡­đź‡·"
  };
  function flaga(n){ return FLAGI[n] || "âš˝"; }
  function esc(s){ return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }

  var STAN = { dane:null, filtr:"wszystkie",
    gracz: localStorage.getItem("typer_gracz") || "",
    pin:   localStorage.getItem("typer_pin")   || "" };

  function punkty(typ, wynik, p){
    if(typ[0] === wynik[0] && typ[1] === wynik[1]) return p.dokladny;
    if(Math.sign(typ[0]-typ[1]) === Math.sign(wynik[0]-wynik[1])) return p.tendencja;
    return 0;
  }

  // ---------- POBIERANIE ----------
  function laduj(){
    var url = API_URL + "?gracz=" + encodeURIComponent(STAN.gracz) + "&pin=" + encodeURIComponent(STAN.pin) + "&t=" + Date.now();
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(d){
        STAN.dane = d;
        rysujLogin();
        rysujWszystko();
      })
      .catch(function(){
        document.getElementById("zawartosc").innerHTML =
          '<p class="info-pasek blad">Nie udaĹ‚o siÄ™ pobraÄ‡ danych. SprawdĹş poĹ‚Ä…czenie albo odĹ›wieĹĽ stronÄ™.<br>' +
          (API_URL.indexOf("TUTAJ") === 0 ? "Uwaga: w pliku index.html nie wklejono jeszcze adresu API_URL." : "") + '</p>';
      });
  }

  function zapiszTyp(meczId, dom, goscie, callback){
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ gracz: STAN.gracz, pin: STAN.pin, meczId: meczId, dom: dom, goscie: goscie })
    })
    .then(function(r){ return r.json(); })
    .then(callback)
    .catch(function(){ callback({ ok:false, blad:"BĹ‚Ä…d poĹ‚Ä…czenia â€” sprĂłbuj jeszcze raz." }); });
  }

  // ---------- LOGOWANIE ----------
  function rysujLogin(){
    var box = document.getElementById("loginBox");
    var d = STAN.dane;
    if(!d){ box.innerHTML = ""; return; }

    if(d.zalogowany){
      var g = d.gracze.find(function(x){ return x.id === d.zalogowany; });
      box.innerHTML =
        '<span class="zalogowany-info"><span class="kropka" style="background:'+esc(g.kolor)+'"></span>' +
        'Typujesz jako <b>'+esc(g.nazwa)+'</b></span>' +
        '<button class="przycisk drugi" id="btnWyloguj">Wyloguj</button>';
      document.getElementById("btnWyloguj").addEventListener("click", function(){
        STAN.gracz = ""; STAN.pin = "";
        localStorage.removeItem("typer_gracz"); localStorage.removeItem("typer_pin");
        laduj();
      });
      return;
    }

    var opcje = d.gracze.map(function(g){
      return '<option value="'+esc(g.id)+'">'+esc(g.nazwa)+'</option>';
    }).join("");
    box.innerHTML =
      '<label for="selGracz">Kto typuje?</label>' +
      '<select id="selGracz">'+opcje+'</select>' +
      '<input id="inpPin" type="password" inputmode="numeric" maxlength="8" placeholder="PIN" aria-label="PIN">' +
      '<button class="przycisk" id="btnZaloguj">WejdĹş</button>' +
      (STAN.gracz && STAN.pin ? '<span class="login-blad">ZĹ‚y gracz lub PIN â€” sprĂłbuj jeszcze raz.</span>' : '');
    document.getElementById("btnZaloguj").addEventListener("click", function(){
      STAN.gracz = document.getElementById("selGracz").value;
      STAN.pin = document.getElementById("inpPin").value.trim();
      localStorage.setItem("typer_gracz", STAN.gracz);
      localStorage.setItem("typer_pin", STAN.pin);
      laduj();
    });
    document.getElementById("inpPin").addEventListener("keydown", function(ev){
      if(ev.key === "Enter") document.getElementById("btnZaloguj").click();
    });
  }

  // ---------- RYSOWANIE CAĹOĹšCI ----------
  function rysujWszystko(){
    var d = STAN.dane;
    var kont = document.getElementById("zawartosc");
    if(!d || !d.ok || !d.mecze){ kont.innerHTML = '<p class="info-pasek blad">BĹ‚Ä…d danych z serwera.</p>'; return; }
    kont.innerHTML =
      htmlTablica() +
      htmlTypowanie() +
      '<nav class="filtry" aria-label="Filtr meczĂłw">' +
        ["wszystkie","nadchodzace","rozegrane"].map(function(f){
          var nazwy = {wszystkie:"Wszystkie", nadchodzace:"NadchodzÄ…ce", rozegrane:"Rozegrane"};
          return '<button class="filtr'+(STAN.filtr===f?" aktywny":"")+'" data-f="'+f+'">'+nazwy[f]+'</button>';
        }).join("") +
      '</nav>' +
      '<section id="mecze">'+htmlListaMeczow()+'</section>';

    kont.querySelectorAll(".filtr").forEach(function(b){
      b.addEventListener("click", function(){
        STAN.filtr = b.dataset.f;
        kont.querySelectorAll(".filtr").forEach(function(x){ x.classList.remove("aktywny"); });
        b.classList.add("aktywny");
        document.getElementById("mecze").innerHTML = htmlListaMeczow();
      });
    });
    podepnijTypowanie();
  }

  // ---------- TABLICA ----------
  function htmlTablica(){
    var d = STAN.dane;
    var rozegrane = d.mecze.filter(function(m){ return m.wynik; });
    var staty = {};
    d.gracze.forEach(function(g){ staty[g.id] = {g:g, pkt:0, dok:0, ten:0, typ:0}; });

    rozegrane.forEach(function(m){
      d.gracze.forEach(function(g){
        var t = m.typy[g.id];
        if(!t || t === "ukryty") return; // po gwizdku serwer odsĹ‚ania wszystko, wiÄ™c "ukryty" tu nie wystÄ…pi
        var s = staty[g.id]; s.typ++;
        var p = punkty(t, m.wynik, d.punktacja);
        s.pkt += p;
        if(p === d.punktacja.dokladny) s.dok++;
        else if(p === d.punktacja.tendencja) s.ten++;
      });
    });

    var ranking = d.gracze.map(function(g){ return staty[g.id]; }).sort(function(a,b){
      if(b.pkt !== a.pkt) return b.pkt - a.pkt;
      if(b.dok !== a.dok) return b.dok - a.dok;
      return a.g.nazwa.localeCompare(b.g.nazwa, "pl");
    });

    var jestLider = rozegrane.length > 0 && ranking[0].pkt > 0;
    var wiersze = ranking.map(function(s, i){
      var sk = s.typ ? Math.round(100*(s.dok+s.ten)/s.typ)+"%" : "â€”";
      var lider = jestLider && s.pkt === ranking[0].pkt ? ' class="lider"' : '';
      return '<tr'+lider+'><td><span class="gracz-cell"><span class="pozycja">'+(i+1)+'.</span>' +
        '<span class="gracz-kolor" style="background:'+esc(s.g.kolor)+'"></span>' +
        '<span class="gracz-nazwa">'+esc(s.g.nazwa)+'</span></span></td>' +
        '<td class="stat-sm">'+s.dok+'</td><td class="stat-sm">'+s.ten+'</td>' +
        '<td class="stat-sm">'+sk+'</td><td class="kol-pkt"><span class="pkt">'+s.pkt+'</span></td></tr>';
    }).join("");

    return '<section class="scoreboard" aria-label="Tabela typera">' +
      '<div class="pasek-lidera" style="background:'+(jestLider ? esc(ranking[0].g.kolor) : 'var(--linia)')+'"></div>' +
      '<div class="sb-naglowek"><h2>Tablica wynikĂłw</h2>' +
      '<span class="postep">rozegrane: '+rozegrane.length+' / '+d.mecze.length+' meczĂłw</span></div>' +
      '<table><thead><tr><th scope="col">Gracz</th><th scope="col">DokĹ‚adne</th><th scope="col">Tendencje</th>' +
      '<th scope="col">SkutecznoĹ›Ä‡</th><th scope="col">Punkty</th></tr></thead>' +
      '<tbody>'+wiersze+'</tbody></table></section>';
  }

  // ---------- SEKCJA TYPOWANIA (dziĹ› + jutro) ----------
  function doObstawienia(){
    var d = STAN.dane;
    if(!d.zalogowany) return [];
    var teraz = new Date();
    var koniecJutra = new Date(teraz);
    koniecJutra.setDate(koniecJutra.getDate() + 1);
    koniecJutra.setHours(23,59,59,999);
    return d.mecze.filter(function(m){
      var kiedy = new Date(m.data);
      return kiedy > teraz && kiedy <= koniecJutra && !m.typy[d.zalogowany];
    });
  }

  var fmtGodz = new Intl.DateTimeFormat("pl-PL", {hour:"2-digit", minute:"2-digit"});
  var fmtDzien = new Intl.DateTimeFormat("pl-PL", {weekday:"long", day:"numeric", month:"long"});
  var fmtKrotko = new Intl.DateTimeFormat("pl-PL", {weekday:"short", hour:"2-digit", minute:"2-digit"});

  function htmlTypowanie(){
    var d = STAN.dane;
    if(!d.zalogowany){
      return '<div class="typuj-box"><h2 class="sekcja-naglowek">Do obstawienia' +
        '<span class="dopisek">zaloguj siÄ™ powyĹĽej, ĹĽeby typowaÄ‡</span></h2></div>';
    }
    var lista = doObstawienia();
    if(!lista.length){
      return '<div class="typuj-box"><h2 class="sekcja-naglowek">Do obstawienia <span class="dopisek">dziĹ› i jutro</span></h2>' +
        '<p class="info-pasek" style="padding:14px 0">Wszystko obstawione â€” wracaj jutro âš˝</p></div>';
    }
    var karty = lista.map(function(m){
      var kiedy = new Date(m.data);
      return '<div class="typuj-mecz" data-mecz="'+esc(m.id)+'">' +
        '<div class="mecz-meta"><span>'+esc(m.faza)+' Â· '+fmtKrotko.format(kiedy)+'</span></div>' +
        '<div class="typuj-glowny">' +
          '<span class="druzyna dom"><span class="nazwa">'+esc(m.dom)+'</span><span class="flaga">'+flaga(m.dom)+'</span></span>' +
          '<span class="typuj-wynik">' +
            '<input type="number" min="0" max="30" inputmode="numeric" class="inp-dom" aria-label="Gole '+esc(m.dom)+'">' +
            '<span class="kreska">:</span>' +
            '<input type="number" min="0" max="30" inputmode="numeric" class="inp-goscie" aria-label="Gole '+esc(m.goscie)+'">' +
          '</span>' +
          '<span class="druzyna"><span class="flaga">'+flaga(m.goscie)+'</span><span class="nazwa">'+esc(m.goscie)+'</span></span>' +
        '</div>' +
        '<div class="typuj-akcje">' +
          '<span class="uwaga">typ bez moĹĽliwoĹ›ci zmiany</span>' +
          '<span class="typuj-status"></span>' +
          '<button class="przycisk btn-zapisz">Zapisz typ</button>' +
        '</div></div>';
    }).join("");
    return '<div class="typuj-box"><h2 class="sekcja-naglowek">Do obstawienia <span class="dopisek">dziĹ› i jutro Â· '+lista.length+' '+(lista.length===1?'mecz':'mecze/-Ăłw')+'</span></h2>'+karty+'</div>';
  }

  function podepnijTypowanie(){
    document.querySelectorAll(".typuj-mecz").forEach(function(karta){
      var btn = karta.querySelector(".btn-zapisz");
      btn.addEventListener("click", function(){
        var dom = karta.querySelector(".inp-dom").value;
        var goscie = karta.querySelector(".inp-goscie").value;
        var status = karta.querySelector(".typuj-status");
        if(dom === "" || goscie === ""){
          status.className = "typuj-status typuj-blad";
          status.textContent = "Wpisz oba wyniki.";
          return;
        }
        if(btn.dataset.potwierdz !== "1"){
          btn.dataset.potwierdz = "1";
          btn.textContent = "Na pewno? " + dom + ":" + goscie;
          status.className = "typuj-status";
          status.textContent = "";
          return;
        }
        btn.disabled = true;
        btn.textContent = "ZapisujÄ™â€¦";
        zapiszTyp(karta.dataset.mecz, dom, goscie, function(odp){
          if(odp.ok){
            status.className = "typuj-status typuj-ok";
            status.textContent = "Zapisane âś”";
            setTimeout(laduj, 700);
          } else {
            btn.disabled = false;
            btn.dataset.potwierdz = "";
            btn.textContent = "Zapisz typ";
            status.className = "typuj-status typuj-blad";
            status.textContent = odp.blad || "Nie udaĹ‚o siÄ™ zapisaÄ‡.";
          }
        });
      });
    });
  }

  // ---------- LISTA MECZĂ“W ----------
  function htmlListaMeczow(){
    var d = STAN.dane;
    var teraz = new Date();
    var lista = d.mecze.filter(function(m){
      if(STAN.filtr === "rozegrane")   return !!m.wynik;
      if(STAN.filtr === "nadchodzace") return !m.wynik;
      return true;
    });
    if(!lista.length) return '<p class="info-pasek">Nic tu jeszcze nie ma.</p>';

    var pierwszyNadchodzacy = null;
    for(var i=0;i<d.mecze.length;i++){
      if(!d.mecze[i].wynik && new Date(d.mecze[i].data) > teraz){ pierwszyNadchodzacy = d.mecze[i].id; break; }
    }

    var html = "", ostatniDzien = "";
    lista.forEach(function(m){
      var kiedy = new Date(m.data);
      var dzien = fmtDzien.format(kiedy);
      if(dzien !== ostatniDzien){
        ostatniDzien = dzien;
        html += '<h3 class="dzien-header">'+dzien+'</h3>';
      }
      var nastepny = m.id === pierwszyNadchodzacy;
      var wTrakcie = !m.wynik && kiedy <= teraz;

      var chips = d.gracze.map(function(g){
        var t = m.typy[g.id];
        if(t === null || t === undefined){
          return '<span class="typ-chip brak"><span class="kropka" style="background:'+esc(g.kolor)+'"></span>' +
                 '<span class="kto">'+esc(g.nazwa)+'</span><span class="ile">â€”</span></span>';
        }
        if(t === "ukryty"){
          return '<span class="typ-chip ukryty"><span class="kropka" style="background:'+esc(g.kolor)+'"></span>' +
                 '<span class="kto">'+esc(g.nazwa)+'</span><span class="ile">đź”’ obstawione</span></span>';
        }
        var klasa = "", zysk = "";
        if(m.wynik){
          var p = punkty(t, m.wynik, d.punktacja);
          if(p === d.punktacja.dokladny){ klasa = "traf"; zysk = "+"+p; }
          else if(p === d.punktacja.tendencja){ klasa = "tend"; zysk = "+"+p; }
          else { klasa = "pudlo"; zysk = "0"; }
        }
        return '<span class="typ-chip '+klasa+'"><span class="kropka" style="background:'+esc(g.kolor)+'"></span>' +
               '<span class="kto">'+esc(g.nazwa)+'</span><span class="ile">'+t[0]+':'+t[1]+'</span>' +
               (zysk !== "" ? '<span class="zysk">'+zysk+'</span>' : '') + '</span>';
      }).join("");

      html += '<div class="mecz'+(nastepny?' nastepny':'')+'">' +
        '<div class="mecz-meta"><span>'+esc(m.faza)+' Â· '+fmtGodz.format(kiedy)+'</span>' +
        (nastepny ? '<span class="badge-nastepny">NastÄ™pny mecz</span>' : (wTrakcie ? '<span class="badge-nastepny">W grze / oczekiwanie na wynik</span>' : '')) +
        '</div>' +
        '<div class="mecz-glowny">' +
          '<span class="druzyna dom"><span class="nazwa">'+esc(m.dom)+'</span><span class="flaga">'+flaga(m.dom)+'</span></span>' +
          (m.wynik ? '<span class="wynik">'+m.wynik[0]+':'+m.wynik[1]+'</span>' : '<span class="wynik pusty">â€“:â€“</span>') +
          '<span class="druzyna"><span class="flaga">'+flaga(m.goscie)+'</span><span class="nazwa">'+esc(m.goscie)+'</span></span>' +
        '</div>' +
        '<div class="typy-row">'+chips+'</div></div>';
    });
    return html;
  }

  laduj();
})();
</script>
</body>
</html>
