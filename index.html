<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typer Mundial 2026 — Tomek · Magda · Kuba</title>
<meta name="description" content="Domowy typer na Mistrzostwa Świata 2026. Punktacja 3/1, tabela liczy się sama.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --noc:#0C1410;
    --panel:#131F18;
    --panel-2:#0F1913;
    --linia:rgba(234,243,236,.10);
    --linia-mocna:rgba(234,243,236,.22);
    --kreda:#EAF3EC;
    --kreda-dim:rgba(234,243,236,.55);
    --kreda-faint:rgba(234,243,236,.32);
    --traf:#58D08B;
    --tend:#E8B84B;
    --pudlo:rgba(234,243,236,.28);
    --promien:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto} *{animation:none!important;transition:none!important} }

  body{
    background:var(--noc);
    color:var(--kreda);
    font-family:"IBM Plex Sans",system-ui,sans-serif;
    font-size:15px;
    line-height:1.5;
    min-height:100vh;
  }

  .display{font-family:"Saira Condensed",sans-serif;text-transform:uppercase;letter-spacing:.04em}
  .num{font-family:"Saira Condensed",sans-serif;font-variant-numeric:tabular-nums}

  /* ---------- NAGŁÓWEK: kreda na murawie ---------- */
  header{
    position:relative;
    overflow:hidden;
    border-bottom:1px solid var(--linia);
    padding:42px 20px 30px;
    text-align:center;
    background:
      radial-gradient(ellipse 90% 130% at 50% -40%, rgba(88,208,139,.10), transparent 60%),
      var(--noc);
  }
  /* koło środkowe boiska */
  header::before{
    content:"";
    position:absolute;
    left:50%; top:100%;
    width:560px; height:560px;
    transform:translate(-50%,-50%);
    border:2px solid var(--linia);
    border-radius:50%;
    pointer-events:none;
  }
  header::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:0;
    height:2px;
    background:var(--linia-mocna);
  }
  .eyebrow{
    font-family:"Saira Condensed",sans-serif;
    text-transform:uppercase;
    letter-spacing:.32em;
    font-size:13px;
    color:var(--kreda-dim);
    margin-bottom:6px;
  }
  h1{
    font-family:"Saira Condensed",sans-serif;
    font-weight:800;
    text-transform:uppercase;
    font-size:clamp(40px,8vw,68px);
    line-height:.95;
    letter-spacing:.02em;
  }
  h1 .rok{color:var(--traf)}
  .zasady{
    margin-top:12px;
    font-size:13px;
    color:var(--kreda-dim);
  }
  .zasady b{color:var(--kreda)}

  main{max-width:880px;margin:0 auto;padding:28px 16px 80px}

  /* ---------- TABLICA WYNIKÓW ---------- */
  .scoreboard{
    background:var(--panel);
    border:1px solid var(--linia);
    border-radius:var(--promien);
    overflow:hidden;
    margin-bottom:34px;
  }
  .scoreboard .pasek-lidera{height:4px;background:var(--linia)}
  .sb-naglowek{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:14px 18px 0;
  }
  .sb-naglowek h2{
    font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;
    letter-spacing:.12em;font-size:16px;color:var(--kreda-dim);
  }
  .sb-naglowek .postep{font-size:12px;color:var(--kreda-faint)}
  table{width:100%;border-collapse:collapse}
  .scoreboard th{
    font-family:"Saira Condensed",sans-serif;font-weight:600;text-transform:uppercase;
    letter-spacing:.14em;font-size:11px;color:var(--kreda-faint);
    text-align:right;padding:14px 18px 8px;border-bottom:1px solid var(--linia);
  }
  .scoreboard th:first-child{text-align:left}
  .scoreboard td{
    padding:12px 18px;border-bottom:1px solid var(--linia);
    text-align:right;vertical-align:middle;
  }
  .scoreboard tr:last-child td{border-bottom:none}
  .scoreboard td:first-child{text-align:left}
  .gracz-cell{display:flex;align-items:center;gap:10px}
  .gracz-kolor{width:10px;height:10px;border-radius:50%;flex:none}
  .gracz-nazwa{font-weight:600;font-size:16px}
  .pozycja{
    font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:14px;
    color:var(--kreda-faint);width:18px;display:inline-block;
  }
  .pkt{
    font-family:"Saira Condensed",sans-serif;font-weight:800;font-size:34px;line-height:1;
    font-variant-numeric:tabular-nums;
  }
  td.kol-pkt{width:90px}
  .stat-sm{font-size:14px;color:var(--kreda-dim);font-variant-numeric:tabular-nums}
  .lider .pkt{color:var(--traf)}
  @media(max-width:560px){
    .scoreboard th:nth-child(4),.scoreboard td:nth-child(4){display:none}
    .pkt{font-size:28px}
  }

  /* ---------- FILTRY ---------- */
  .filtry{
    display:flex;gap:8px;flex-wrap:wrap;align-items:center;
    margin-bottom:22px;
  }
  .filtr{
    background:transparent;border:1px solid var(--linia-mocna);color:var(--kreda-dim);
    font-family:"Saira Condensed",sans-serif;text-transform:uppercase;letter-spacing:.1em;
    font-size:13px;font-weight:600;
    padding:7px 16px;border-radius:999px;cursor:pointer;
    transition:border-color .15s,color .15s;
  }
  .filtr:hover{color:var(--kreda)}
  .filtr:focus-visible{outline:2px solid var(--traf);outline-offset:2px}
  .filtr.aktywny{background:var(--kreda);color:var(--noc);border-color:var(--kreda)}

  /* ---------- LISTA MECZÓW ---------- */
  .dzien-header{
    font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;
    letter-spacing:.14em;font-size:14px;color:var(--kreda-dim);
    margin:30px 0 10px;padding-bottom:6px;
    border-bottom:1px solid var(--linia);
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .dzien-header:first-child{margin-top:0}

  .mecz{
    background:var(--panel-2);
    border:1px solid var(--linia);
    border-radius:var(--promien);
    padding:14px 16px 12px;
    margin-bottom:10px;
  }
  .mecz.nastepny{border-color:rgba(88,208,139,.45)}
  .mecz-meta{
    display:flex;justify-content:space-between;align-items:center;
    font-size:12px;color:var(--kreda-faint);margin-bottom:8px;
  }
  .badge-nastepny{
    font-family:"Saira Condensed",sans-serif;font-weight:700;text-transform:uppercase;
    letter-spacing:.12em;font-size:11px;color:var(--traf);
  }
  .mecz-glowny{
    display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;
  }
  .druzyna{display:flex;align-items:center;gap:8px;min-width:0}
  .druzyna.dom{justify-content:flex-end;text-align:right}
  .druzyna .nazwa{font-weight:600;font-size:15px;overflow-wrap:anywhere}
  .flaga{font-size:20px;flex:none;line-height:1}
  .wynik{
    font-family:"Saira Condensed",sans-serif;font-weight:800;font-size:28px;line-height:1;
    font-variant-numeric:tabular-nums;
    min-width:74px;text-align:center;
    padding:4px 10px;border-radius:6px;
    background:var(--panel);border:1px solid var(--linia);
  }
  .wynik.pusty{color:var(--kreda-faint);font-weight:600}
  @media(max-width:560px){
    .druzyna .nazwa{font-size:13px}
    .wynik{font-size:22px;min-width:62px}
  }

  .typy-row{
    display:flex;gap:8px;flex-wrap:wrap;
    margin-top:12px;padding-top:10px;border-top:1px dashed var(--linia);
  }
  .typ-chip{
    display:inline-flex;align-items:center;gap:7px;
    border:1px solid var(--linia);border-radius:999px;
    padding:3px 12px 3px 9px;font-size:13px;
    background:var(--panel);
  }
  .typ-chip .kropka{width:7px;height:7px;border-radius:50%;flex:none}
  .typ-chip .kto{color:var(--kreda-dim);font-size:12px}
  .typ-chip .ile{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:15px;font-variant-numeric:tabular-nums}
  .typ-chip .zysk{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:13px}
  .typ-chip.traf{border-color:rgba(88,208,139,.5)}
  .typ-chip.traf .zysk{color:var(--traf)}
  .typ-chip.tend .zysk{color:var(--tend)}
  .typ-chip.pudlo .ile{color:var(--pudlo)}
  .typ-chip.pudlo .zysk{color:var(--pudlo)}
  .typ-chip.brak{opacity:.45}

  .pusto{
    text-align:center;color:var(--kreda-faint);padding:50px 0;font-size:14px;
  }

  footer{
    text-align:center;font-size:12px;color:var(--kreda-faint);
    padding:30px 16px 40px;border-top:1px solid var(--linia);
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Tomek · Magda · Kuba</p>
  <h1>Typer Mundial <span class="rok">2026</span></h1>
  <p class="zasady">dokładny wynik <b>3 pkt</b> · trafiona tendencja <b>1 pkt</b> · faza pucharowa: wynik po 90 min · typy do pierwszego gwizdka</p>
</header>

<main>
  <section class="scoreboard" aria-label="Tabela typera">
    <div class="pasek-lidera" id="pasekLidera"></div>
    <div class="sb-naglowek">
      <h2>Tablica wyników</h2>
      <span class="postep" id="postep"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th scope="col">Gracz</th>
          <th scope="col">Dokładne</th>
          <th scope="col">Tendencje</th>
          <th scope="col">Skuteczność</th>
          <th scope="col">Punkty</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </section>

  <nav class="filtry" aria-label="Filtr meczów">
    <button class="filtr aktywny" data-f="wszystkie">Wszystkie</button>
    <button class="filtr" data-f="nadchodzace">Nadchodzące</button>
    <button class="filtr" data-f="rozegrane">Rozegrane</button>
  </nav>

  <section id="mecze" aria-live="polite"></section>
</main>

<footer>
  Wyniki i typy aktualizowane w pliku <code>dane.js</code> · tabela liczy się automatycznie
</footer>

<script src="dane.js"></script>
<script>
(function(){
  "use strict";

  var D = window.TYPER;
  if(!D || !D.mecze){ document.getElementById("mecze").innerHTML = '<p class="pusto">Brak danych — sprawdź plik dane.js</p>'; return; }

  var FLAGI = {
    "Meksyk":"🇲🇽","RPA":"🇿🇦","Korea Płd.":"🇰🇷","Czechy":"🇨🇿",
    "Kanada":"🇨🇦","Bośnia i Hercegowina":"🇧🇦","Katar":"🇶🇦","Szwajcaria":"🇨🇭",
    "Brazylia":"🇧🇷","Maroko":"🇲🇦","Haiti":"🇭🇹","Szkocja":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
    "USA":"🇺🇸","Paragwaj":"🇵🇾","Australia":"🇦🇺","Turcja":"🇹🇷",
    "Niemcy":"🇩🇪","Curacao":"🇨🇼","Wybrzeże Kości Słoniowej":"🇨🇮","Ekwador":"🇪🇨",
    "Holandia":"🇳🇱","Japonia":"🇯🇵","Szwecja":"🇸🇪","Tunezja":"🇹🇳",
    "Belgia":"🇧🇪","Egipt":"🇪🇬","Iran":"🇮🇷","Nowa Zelandia":"🇳🇿",
    "Hiszpania":"🇪🇸","Rep. Zielonego Przylądka":"🇨🇻","Arabia Saudyjska":"🇸🇦","Urugwaj":"🇺🇾",
    "Francja":"🇫🇷","Senegal":"🇸🇳","Irak":"🇮🇶","Norwegia":"🇳🇴",
    "Argentyna":"🇦🇷","Algieria":"🇩🇿","Austria":"🇦🇹","Jordania":"🇯🇴",
    "Portugalia":"🇵🇹","DR Konga":"🇨🇩","Uzbekistan":"🇺🇿","Kolumbia":"🇨🇴",
    "Anglia":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Ghana":"🇬🇭","Panama":"🇵🇦","Chorwacja":"🇭🇷",
    "Polska":"🇵🇱","Włochy":"🇮🇹","Ukraina":"🇺🇦","Dania":"🇩🇰","Walia":"🏴󠁧󠁢󠁷󠁬󠁳󠁿"
  };
  function flaga(n){ return FLAGI[n] || "⚽"; }

  // ---------- PUNKTACJA ----------
  function punkty(typ, wynik){
    if(!typ || !wynik) return null;
    if(typ[0] === wynik[0] && typ[1] === wynik[1]) return D.punktacja.dokladny;
    var st = Math.sign(typ[0]-typ[1]), sw = Math.sign(wynik[0]-wynik[1]);
    if(st === sw) return D.punktacja.tendencja;
    return 0;
  }

  // ---------- TABELA ----------
  var mecze = D.mecze.slice().sort(function(a,b){ return a.data < b.data ? -1 : 1; });
  var rozegrane = mecze.filter(function(m){ return m.wynik; });

  var staty = {};
  D.gracze.forEach(function(g){ staty[g.id] = {gracz:g, pkt:0, dokladne:0, tendencje:0, typowane:0}; });

  rozegrane.forEach(function(m){
    D.gracze.forEach(function(g){
      var typ = m.typy && m.typy[g.id];
      if(!typ) return;
      var s = staty[g.id];
      s.typowane++;
      var p = punkty(typ, m.wynik);
      s.pkt += p;
      if(p === D.punktacja.dokladny) s.dokladne++;
      else if(p === D.punktacja.tendencja) s.tendencje++;
    });
  });

  var ranking = D.gracze.map(function(g){ return staty[g.id]; }).sort(function(a,b){
    if(b.pkt !== a.pkt) return b.pkt - a.pkt;
    if(b.dokladne !== a.dokladne) return b.dokladne - a.dokladne; // tie-breaker
    return a.gracz.nazwa.localeCompare(b.gracz.nazwa, "pl");
  });

  var tbody = document.getElementById("tabela");
  var jestLider = rozegrane.length > 0 && ranking[0].pkt > 0;
  ranking.forEach(function(s, i){
    var tr = document.createElement("tr");
    var liderKlasa = (jestLider && s.pkt === ranking[0].pkt) ? " lider" : "";
    tr.className = liderKlasa.trim();
    var sk = s.typowane ? Math.round(100 * (s.dokladne + s.tendencje) / s.typowane) + "%" : "—";
    tr.innerHTML =
      '<td><span class="gracz-cell"><span class="pozycja">'+(i+1)+'.</span>' +
      '<span class="gracz-kolor" style="background:'+s.gracz.kolor+'"></span>' +
      '<span class="gracz-nazwa">'+s.gracz.nazwa+'</span></span></td>' +
      '<td class="stat-sm">'+s.dokladne+'</td>' +
      '<td class="stat-sm">'+s.tendencje+'</td>' +
      '<td class="stat-sm">'+sk+'</td>' +
      '<td class="kol-pkt"><span class="pkt">'+s.pkt+'</span></td>';
    tbody.appendChild(tr);
  });

  if(jestLider){
    document.getElementById("pasekLidera").style.background = ranking[0].gracz.kolor;
  }
  document.getElementById("postep").textContent =
    "rozegrane: " + rozegrane.length + " / " + mecze.length + " meczów";

  // ---------- LISTA MECZÓW ----------
  var teraz = new Date();
  var pierwszyNadchodzacy = null;
  for(var i=0;i<mecze.length;i++){
    if(!mecze[i].wynik && new Date(mecze[i].data) > teraz){ pierwszyNadchodzacy = mecze[i].id; break; }
  }

  var fmtDzien = new Intl.DateTimeFormat("pl-PL", {weekday:"long", day:"numeric", month:"long"});
  var fmtGodz  = new Intl.DateTimeFormat("pl-PL", {hour:"2-digit", minute:"2-digit"});

  function renderuj(filtr){
    var kont = document.getElementById("mecze");
    kont.innerHTML = "";
    var lista = mecze.filter(function(m){
      if(filtr === "rozegrane")   return !!m.wynik;
      if(filtr === "nadchodzace") return !m.wynik;
      return true;
    });
    if(!lista.length){
      kont.innerHTML = '<p class="pusto">Nic tu jeszcze nie ma.</p>';
      return;
    }

    var ostatniDzien = "";
    lista.forEach(function(m){
      var d = new Date(m.data);
      var dzien = fmtDzien.format(d);
      if(dzien !== ostatniDzien){
        ostatniDzien = dzien;
        var h = document.createElement("h3");
        h.className = "dzien-header";
        h.textContent = dzien;
        kont.appendChild(h);
      }

      var div = document.createElement("div");
      var nastepny = m.id === pierwszyNadchodzacy;
      div.className = "mecz" + (nastepny ? " nastepny" : "");

      var meta =
        '<div class="mecz-meta"><span>'+m.faza+' · '+fmtGodz.format(d)+'</span>' +
        (nastepny ? '<span class="badge-nastepny">Następny mecz</span>' : '') +
        '</div>';

      var wynikHtml = m.wynik
        ? '<span class="wynik">'+m.wynik[0]+':'+m.wynik[1]+'</span>'
        : '<span class="wynik pusty">–:–</span>';

      var glowny =
        '<div class="mecz-glowny">' +
          '<span class="druzyna dom"><span class="nazwa">'+m.dom+'</span><span class="flaga">'+flaga(m.dom)+'</span></span>' +
          wynikHtml +
          '<span class="druzyna"><span class="flaga">'+flaga(m.goscie)+'</span><span class="nazwa">'+m.goscie+'</span></span>' +
        '</div>';

      var chips = D.gracze.map(function(g){
        var typ = m.typy && m.typy[g.id];
        if(!typ){
          return '<span class="typ-chip brak"><span class="kropka" style="background:'+g.kolor+'"></span>' +
                 '<span class="kto">'+g.nazwa+'</span><span class="ile">—</span></span>';
        }
        var p = m.wynik ? punkty(typ, m.wynik) : null;
        var klasa = "", zysk = "";
        if(p !== null){
          if(p === D.punktacja.dokladny){ klasa = "traf";  zysk = "+"+p; }
          else if(p === D.punktacja.tendencja){ klasa = "tend"; zysk = "+"+p; }
          else { klasa = "pudlo"; zysk = "0"; }
        }
        return '<span class="typ-chip '+klasa+'"><span class="kropka" style="background:'+g.kolor+'"></span>' +
               '<span class="kto">'+g.nazwa+'</span>' +
               '<span class="ile">'+typ[0]+':'+typ[1]+'</span>' +
               (zysk ? '<span class="zysk">'+zysk+'</span>' : '') +
               '</span>';
      }).join("");

      div.innerHTML = meta + glowny + '<div class="typy-row">'+chips+'</div>';
      kont.appendChild(div);
    });
  }

  // filtry
  var przyciski = document.querySelectorAll(".filtr");
  przyciski.forEach(function(b){
    b.addEventListener("click", function(){
      przyciski.forEach(function(x){ x.classList.remove("aktywny"); });
      b.classList.add("aktywny");
      renderuj(b.dataset.f);
    });
  });

  renderuj("wszystkie");
})();
</script>
</body>
</html>
